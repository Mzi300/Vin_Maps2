version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: vinmaps_db
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_DATABASE:-vinmaps}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - vinmaps_db_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: vinmaps_redis
    ports:
      - '6379:6379'
    volumes:
      - vinmaps_redis_data:/data
    restart: unless-stopped

volumes:
  vinmaps_db_data:
  vinmaps_redis_data:
